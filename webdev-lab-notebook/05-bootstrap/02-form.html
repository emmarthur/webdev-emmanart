<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-4 py-lg-5">
      <h1 class="text-center mb-4 fs-2">Roth IRA Calculator</h1>

      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form action="#" method="get">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label for="balance" class="form-label">Balance ($)</label>
                    <input
                      type="number"
                      class="form-control"
                      id="balance"
                      name="balance"
                      min="0"
                      step="0.01"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="annual-contribution" class="form-label">Annual contribution ($)</label>
                    <input
                      type="number"
                      class="form-control"
                      id="annual-contribution"
                      name="annual_contribution"
                      min="0"
                      step="0.01"
                    />
                  </div>

                  <div class="col-12">
                    <fieldset>
                      <legend class="form-label mb-2">Maximize contribution?</legend>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="maximize"
                          id="maximize-yes"
                          value="yes"
                        />
                        <label class="form-check-label" for="maximize-yes">Yes</label>
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="maximize"
                          id="maximize-no"
                          value="no"
                          checked
                        />
                        <label class="form-check-label" for="maximize-no">No</label>
                      </div>
                    </fieldset>
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="rate-of-return" class="form-label">Expected rate of return (%)</label>
                    <input
                      type="number"
                      class="form-control"
                      id="rate-of-return"
                      name="rate_of_return"
                      min="0"
                      max="100"
                      step="0.1"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="current-age" class="form-label">Current age</label>
                    <input
                      type="number"
                      class="form-control"
                      id="current-age"
                      name="current_age"
                      min="0"
                      max="120"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="retirement-age" class="form-label">Retirement age</label>
                    <input
                      type="number"
                      class="form-control"
                      id="retirement-age"
                      name="retirement_age"
                      min="0"
                      max="120"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="marginal-tax" class="form-label">Marginal tax rate (%)</label>
                    <input
                      type="number"
                      class="form-control"
                      id="marginal-tax"
                      name="marginal_tax_rate"
                      min="0"
                      max="100"
                      step="0.1"
                    />
                  </div>

                  <div class="col-12">
                    <div
                      class="d-grid gap-2 d-sm-flex justify-content-sm-center flex-wrap pt-2"
                    >
                      <button type="submit" class="btn btn-primary px-4">Calculate</button>
                      <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <p class="text-center text-muted small mt-4 mb-0 px-2">
            This exercise is a simplified version of the Roth IRA Calculator at
            <a
              href="https://www.calculator.net/roth-ira-calculator.html"
              class="link-secondary"
              >Calculator.net</a
            >.
          </p>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
